name: Build Windows installer

# Build the .exe installer on every version tag (e.g. v1.0.0) and attach it to a
# GitHub Release. Also runnable on demand from the Actions tab.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build installer
        # --publish never: just build the artifacts; the release step below
        # (softprops/action-gh-release) handles attaching them, so electron-builder
        # doesn't need its own GH_TOKEN to auto-publish.
        run: npx electron-builder --win --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: 8BitBeatBox-windows
          path: |
            dist/*.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
